<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小七班钱袋子 - 资金公示</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .circle-progress { transition: stroke-dashoffset 0.5s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900" x-data="fundApp()">

    <!-- 顶部导航栏 -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="p-2 bg-green-100 rounded-lg text-green-600">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-800">小七班钱袋子</span>
                </div>
                <div class="flex items-center gap-4">
                    <template x-if="!isAdmin">
                        <button @click="openLoginModal()" class="text-sm font-medium text-green-600 hover:text-green-700 transition-colors flex items-center gap-1">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                            管理入口
                        </button>
                    </template>
                    <template x-if="isAdmin">
                        <div class="flex items-center gap-4">
                            <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">管理员已登录</span>
                            <button @click="logout()" class="text-sm text-gray-500 hover:text-red-500 transition-colors">退出</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">
        <!-- 资金总额模块 -->
        <section class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 flex flex-col items-center text-center">
            <h2 class="text-gray-500 font-medium mb-6">当前资金状态</h2>

            <div class="relative w-64 h-64 flex items-center justify-center cursor-pointer group"
                 @click="isAdmin ? openEditTotalModal() : null">
                <!-- SVG 进度条 -->
                <svg class="w-full h-full transform -rotate-90">
                    <circle cx="128" cy="128" r="110" fill="transparent" stroke="#F3F4F6" stroke-width="20" />
                    <circle cx="128" cy="128" r="110" fill="transparent"
                            :stroke="getFillColor()"
                            stroke-width="20"
                            stroke-linecap="round"
                            class="circle-progress"
                            :stroke-dasharray="dashArray"
                            :stroke-dashoffset="dashOffset" />
                </svg>

                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-4xl font-bold text-gray-800" x-text="'¥' + currentBalance"></span>
                    <div class="mt-1 flex flex-col items-center">
                        <span class="text-sm text-gray-400">总额 ¥<span x-text="totalBudget"></span></span>
                        <template x-if="isAdmin">
                            <div class="mt-2 text-xs text-green-600 opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
                                <i data-lucide="edit-2" class="w-3 h-3"></i> 修改总额
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-4 w-full max-w-sm">
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-xs text-gray-400 mb-1">已花费</div>
                    <div class="text-lg font-bold text-red-500" x-text="'¥' + spentAmount"></div>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-xs text-gray-400 mb-1">使用率</div>
                    <div class="text-lg font-bold text-blue-500" x-text="usePercentage + '%'"></div>
                </div>
            </div>
        </section>

        <!-- 信息公示模块 -->
        <section class="space-y-6">
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">小七班资金使用动态公示</h2>
                    <p class="text-sm text-gray-400 mt-1">记录班级每一分钱的去向</p>
                </div>
                <template x-if="isAdmin">
                    <button @click="openAddRecordModal()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-lg shadow-green-100 flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> 发布新动态
                    </button>
                </template>
            </div>

            <div class="space-y-4">
                <template x-for="record in records" :key="record.id">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 group transition-all hover:shadow-md">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-yellow-50 rounded-full flex items-center justify-center overflow-hidden border border-yellow-100">
                                    <img :src="'https://api.dicebear.com/7.x/big-smile/svg?seed=' + encodeURIComponent(record.operator)" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <div class="font-semibold text-gray-800 break-words" x-text="record.operator"></div>
                                    <div class="text-xs text-gray-400" x-text="formatDate(record.time)"></div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-lg font-bold text-red-500 break-words" x-text="'- ¥' + record.amount"></span>
                                <template x-if="isAdmin">
                                    <div class="flex gap-1 ml-2">
                                        <button @click="editRecord(record)" class="p-2 text-gray-400 hover:text-green-600 hover:bg-green-50 rounded-lg transition-colors">
                                            <i data-lucide="edit" class="w-4 h-4"></i>
                                        </button>
                                        <button @click="deleteRecord(record.id)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="mb-4 text-gray-600 leading-relaxed break-words whitespace-pre-wrap" x-text="record.remark || '无备注'"></div>

                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-4">
                            <template x-for="img in record.images" :key="img">
                                <div class="relative aspect-square bg-gray-100 rounded-xl overflow-hidden cursor-zoom-in" @click="zoomImage(img)">
                                    <img :src="img" class="w-full h-full object-cover">
                                </div>
                            </template>
                        </div>

                        <div class="pt-4 border-t border-gray-50 flex gap-6 text-xs text-gray-400">
                            <div class="flex items-center gap-1">
                                <i data-lucide="arrow-down-right" class="w-3 h-3 text-red-400"></i>
                                剩余余额：¥<span x-text="record.balanceAfter"></span>
                            </div>
                            <div class="flex items-center gap-1">
                                <i data-lucide="target" class="w-3 h-3 text-blue-400"></i>
                                当时总额：¥<span x-text="record.totalAtTime"></span>
                            </div>
                        </div>
                    </div>
                </template>
                <template x-if="records.length === 0">
                    <div class="py-20 text-center text-gray-400 bg-white rounded-2xl border-2 border-dashed border-gray-100 px-4">
                        <i data-lucide="info" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p class="break-words">暂无公示动态</p>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <!-- 弹窗：登录 -->
    <div x-show="showLoginModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl" @click.away="showLoginModal = false">
            <h3 class="text-xl font-bold mb-2">管理员验证</h3>
            <p class="text-sm text-gray-400 mb-6">请输入管理员密码以进入管理模式</p>
            <input type="password" x-model="loginPassword" placeholder="请输入密码 (默认: 123456)"
                   class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl mb-6 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            <div class="flex gap-3">
                <button @click="showLoginModal = false" class="flex-1 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 rounded-xl">取消</button>
                <button @click="login()" class="flex-1 py-3 text-sm font-medium bg-green-600 text-white rounded-xl shadow-lg shadow-green-100">确认登录</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：修改总额 -->
    <div x-show="showEditTotalModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl" @click.away="showEditTotalModal = false">
            <h3 class="text-xl font-bold mb-2">修改总初始额度</h3>
            <p class="text-sm text-gray-400 mb-6">修改后将同步更新可视化组件</p>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">¥</span>
                <input type="number" x-model="newTotalBudget"
                       class="w-full pl-8 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div class="flex gap-3">
                <button @click="showEditTotalModal = false" class="flex-1 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 rounded-xl">取消</button>
                <button @click="saveTotalBudget()" class="flex-1 py-3 text-sm font-medium bg-green-600 text-white rounded-xl shadow-lg shadow-green-100">确认修改</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：发布/编辑动态 -->
    <div x-show="showAddRecordModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm overflow-y-auto" x-cloak>
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl my-8" @click.away="showAddRecordModal = false">
            <h3 class="text-xl font-bold mb-2" x-text="isEditing ? '编辑动态' : '发布新动态'"></h3>
            <div class="space-y-4 mt-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">操作人</label>
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-yellow-50 rounded-full flex items-center justify-center overflow-hidden border border-yellow-100 flex-shrink-0">
                            <img :src="'https://api.dicebear.com/7.x/big-smile/svg?seed=' + encodeURIComponent(formData.operator || 'default')" class="w-full h-full object-cover">
                        </div>
                        <input type="text" x-model="formData.operator" placeholder="输入姓名自动生成头像" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">花费金额 (元)</label>
                        <input type="number" x-model="formData.amount" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">花费时间</label>
                        <input type="datetime-local" x-model="formData.time" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">凭证截图 (点击可选择，可多选)</label>
                    <div class="grid grid-cols-3 gap-2">
                        <template x-for="(img, index) in formData.images" :key="index">
                            <div class="relative aspect-square bg-gray-100 rounded-xl overflow-hidden group">
                                <img :src="img" class="w-full h-full object-cover">
                                <button @click="formData.images.splice(index, 1)" class="absolute top-1 right-1 p-1 bg-black/50 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i data-lucide="x" class="w-3 h-3"></i>
                                </button>
                            </div>
                        </template>
                        <label class="aspect-square border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center text-gray-400 hover:border-green-500 hover:text-green-500 cursor-pointer transition-all">
                            <i data-lucide="image-plus" class="w-6 h-6"></i>
                            <input type="file" multiple accept="image/*" class="hidden" @change="handleFileUpload($event)">
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">花费用途/备注</label>
                    <textarea x-model="formData.remark" rows="3" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-green-500 outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button @click="showAddRecordModal = false" class="flex-1 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 rounded-xl">取消</button>
                <button @click="saveRecord()" class="flex-1 py-3 text-sm font-medium bg-green-600 text-white rounded-xl shadow-lg shadow-green-100">确认提交</button>
            </div>
        </div>
    </div>

    <!-- 图片大图预览 -->
    <div x-show="zoomedImg" class="fixed inset-0 z-[200] flex items-center justify-center p-8 bg-black/90" @click="zoomedImg = null" x-cloak>
        <img :src="zoomedImg" class="max-w-full max-h-full object-contain">
    </div>

    <script>
        function fundApp() {
            return {
                isAdmin: false,
                showLoginModal: false,
                showEditTotalModal: false,
                showAddRecordModal: false,
                isEditing: false,
                loginPassword: '',
                zoomedImg: null,

                totalBudget: 0,
                newTotalBudget: 0,
                records: [],

                formData: {
                    id: null,
                    operator: '管理员',
                    amount: '',
                    time: '',
                    images: [],
                    remark: ''
                },

                init() {
                    // 初始化 Lucide 图标
                    lucide.createIcons();

                    // 从 localStorage 加载数据
                    const savedTotal = localStorage.getItem('c7_total_budget');
                    const savedRecords = localStorage.getItem('c7_records');

                    this.totalBudget = savedTotal ? parseFloat(savedTotal) : 1000;
                    this.records = savedRecords ? JSON.parse(savedRecords) : [];
                    this.isAdmin = localStorage.getItem('c7_is_admin') === 'true';

                    // 重新创建图标以应对动态内容
                    this.$watch('records', () => this.$nextTick(() => lucide.createIcons()));
                    this.$watch('isAdmin', () => this.$nextTick(() => lucide.createIcons()));
                },

                get currentBalance() {
                    const spent = this.records.reduce((sum, r) => sum + parseFloat(r.amount || 0), 0);
                    return (this.totalBudget - spent).toFixed(2);
                },

                get spentAmount() {
                    return this.records.reduce((sum, r) => sum + parseFloat(r.amount || 0), 0).toFixed(2);
                },

                get usePercentage() {
                    if (this.totalBudget === 0) return 0;
                    return ((this.spentAmount / this.totalBudget) * 100).toFixed(1);
                },

                get dashArray() {
                    return 2 * Math.PI * 110;
                },

                get dashOffset() {
                    const ratio = Math.max(0, Math.min(1, parseFloat(this.currentBalance) / this.totalBudget));
                    return this.dashArray * (1 - ratio);
                },

                getFillColor() {
                    const ratio = parseFloat(this.currentBalance) / this.totalBudget;
                    if (ratio > 0.6) return '#22C55E'; // Green
                    if (ratio > 0.2) return '#F59E0B'; // Amber
                    return '#EF4444'; // Red
                },

                openLoginModal() {
                    this.loginPassword = '';
                    this.showLoginModal = true;
                },

                login() {
                    if (this.loginPassword === '201907') {
                        this.isAdmin = true;
                        localStorage.setItem('c7_is_admin', 'true');
                        this.showLoginModal = false;
                        alert('登录成功！');
                    } else {
                        alert('密码错误！');
                    }
                },

                logout() {
                    this.isAdmin = false;
                    localStorage.setItem('c7_is_admin', 'false');
                },

                openEditTotalModal() {
                    this.newTotalBudget = this.totalBudget;
                    this.showEditTotalModal = true;
                },

                saveTotalBudget() {
                    if (confirm(`确认修改总资金为 ${this.newTotalBudget} 元？修改后将同步更新可视化组件。`)) {
                        this.totalBudget = parseFloat(this.newTotalBudget);
                        localStorage.setItem('c7_total_budget', this.totalBudget);
                        this.showEditTotalModal = false;
                        this.saveLog(`修改了总预算：${this.totalBudget}`);
                    }
                },

                openAddRecordModal() {
                    this.isEditing = false;
                    this.formData = {
                        id: null,
                        operator: '管理员',
                        amount: '',
                        time: new Date().toISOString().slice(0, 16),
                        images: [],
                        remark: ''
                    };
                    this.showAddRecordModal = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                handleFileUpload(e) {
                    const files = Array.from(e.target.files);
                    files.forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.formData.images.push(event.target.result);
                        };
                        reader.readAsDataURL(file);
                    });
                },

                saveRecord() {
                    if (!this.formData.amount || !this.formData.time) {
                        alert('请填写金额和时间！');
                        return;
                    }

                    const record = {
                        ...this.formData,
                        id: this.formData.id || Date.now(),
                        amount: parseFloat(this.formData.amount),
                        balanceAfter: 0, // Will calculate below
                        totalAtTime: this.totalBudget
                    };

                    if (this.isEditing) {
                        const index = this.records.findIndex(r => r.id === record.id);
                        this.records[index] = record;
                    } else {
                        this.records.unshift(record);
                    }

                    // Sort by time desc
                    this.records.sort((a, b) => new Date(b.time) - new Date(a.time));

                    // Re-calculate balanceAfter for all records (simplified)
                    this.recalculateBalances();

                    localStorage.setItem('c7_records', JSON.stringify(this.records));
                    this.showAddRecordModal = false;
                },

                recalculateBalances() {
                    let current = this.totalBudget;
                    // Sort ASC to calculate balance forward, then keep DESC for display
                    const sortedAsc = [...this.records].sort((a, b) => new Date(a.time) - new Date(b.time));
                    sortedAsc.forEach(r => {
                        current -= r.amount;
                        r.balanceAfter = current.toFixed(2);
                    });
                },

                editRecord(record) {
                    this.isEditing = true;
                    this.formData = JSON.parse(JSON.stringify(record));
                    this.showAddRecordModal = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                deleteRecord(id) {
                    if (confirm('确定要删除这条动态吗？操作不可撤销。')) {
                        this.records = this.records.filter(r => r.id !== id);
                        this.recalculateBalances();
                        localStorage.setItem('c7_records', JSON.stringify(this.records));
                    }
                },

                zoomImage(img) {
                    this.zoomedImg = img;
                },

                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const date = new Date(dateStr);
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    const seconds = String(date.getSeconds()).padStart(2, '0');
                    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                },

                saveLog(msg) {
                    console.log(`[LOG] ${new Date().toLocaleString()}: ${msg}`);
                    // Could store logs in localStorage too if needed
                }
            }
        }
    </script>
</body>
</html>
